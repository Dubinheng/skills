<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>杜斌衡 · 简历</title>
  <style>
    :root {
      --bg:     #080810;
      --glass:  rgba(255,255,255,0.05);
      --glass2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.10);
      --border2:rgba(255,255,255,0.16);
      --text:   #F0EEFF;
      --sub:    rgba(240,238,255,0.60);
      --muted:  rgba(240,238,255,0.35);
      --p1: #A855F7;   /* purple */
      --p2: #EC4899;   /* pink   */
      --p3: #F97316;   /* orange */
      --font: Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      --font-mono:"JetBrains Mono","Fira Code",monospace;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* ── Gradient mesh background ── */
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(139,92,246,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 10%, rgba(236,72,153,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 80% 90%, rgba(249,115,22,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(99,102,241,0.10) 0%, transparent 50%);
      pointer-events:none;
      z-index:0;
    }

    /* ── Floating orbs ── */
    .orb {
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      pointer-events:none;
      z-index:0;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb1{width:400px;height:400px;background:rgba(139,92,246,0.12);top:-100px;left:-100px;animation-duration:20s}
    .orb2{width:300px;height:300px;background:rgba(249,115,22,0.10);bottom:-80px;right:-80px;animation-duration:15s;animation-delay:-7s}
    .orb3{width:250px;height:250px;background:rgba(236,72,153,0.08);top:40%;left:60%;animation-duration:25s;animation-delay:-12s}

    @keyframes drift{
      from{transform:translate(0,0) scale(1)}
      to{transform:translate(40px,30px) scale(1.08)}
    }

    /* ── Page ── */
    .page {
      position:relative;z-index:1;
      max-width:860px;
      margin:0 auto;
      padding:60px 24px 100px;
    }

    /* ── Glass card ── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
    }

    /* ── HERO ── */
    .hero {
      padding: 56px 56px 48px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content:'';
      position:absolute;
      inset:0;
      background: linear-gradient(135deg, rgba(139,92,246,0.08) 0%, rgba(249,115,22,0.05) 100%);
      border-radius:inherit;
    }

    .hero-inner { position:relative; z-index:1; display:flex; gap:48px; align-items:center; }

    /* ── Hero 左侧文字区 ── */
    .hero-left { flex:1; display:flex; flex-direction:column; justify-content:center; gap:0; }

    .hero-badge {
      display:inline-block;
      font-family:var(--font-mono);
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: var(--p1);
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.25);
      border-radius:999px;
      padding:4px 14px;
      margin-bottom:16px;
      width:fit-content;
    }

    .hero-name {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #F0EEFF 0%, var(--p1) 40%, var(--p3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-typed {
      font-size:15px;
      color: var(--sub);
      min-height:22px;
      margin-bottom:20px;
    }

    .cursor {
      display:inline-block;
      width:2px;height:.9em;
      background: linear-gradient(to bottom, var(--p1), var(--p3));
      margin-left:2px;
      vertical-align:middle;
      animation:blink 1s step-end infinite;
    }
    @keyframes blink{50%{opacity:0}}

    /* 分割线 */
    .hero-divider{ width:100%; height:1px; background:rgba(255,255,255,.08); margin-bottom:18px; }

    /* meta 三列 */
    .hero-meta-row{ display:flex; gap:28px; flex-wrap:wrap; margin-bottom:16px; }
    .hero-meta-item{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--sub); }
    .hero-meta-item svg{ width:13px; height:13px; opacity:.5; flex-shrink:0; }

    /* 意向标签 */
    .intent-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
    .itag {
      font-size:11px;font-weight:500;
      border-radius:999px;padding:4px 12px;
      border:1px solid rgba(255,255,255,0.12);
      color:var(--text);
    }
    .itag:nth-child(1){background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.3)}
    .itag:nth-child(2){background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.25)}
    .itag:nth-child(3){background:rgba(236,72,153,0.12);border-color:rgba(236,72,153,0.25)}
    .itag:nth-child(n+4){background:rgba(255,255,255,0.06)}

    /* 联系方式 */
    .hero-contacts { display:flex; flex-wrap:wrap; gap:8px 20px; }
    .contact-item {
      display:flex;align-items:center;gap:6px;
      font-size:12px;color:var(--sub);
      text-decoration:none;
      transition:color .18s;
    }
    .contact-item:hover{color:var(--text)}
    .contact-item svg{width:13px;height:13px;opacity:.5}

    /* ── Hero 右侧头像 3:4 ── */
    .hero-avatar {
      width:156px;
      height:208px;
      flex-shrink:0;
      border-radius:16px;
      background:linear-gradient(160deg,rgba(168,85,247,.18),rgba(249,115,22,.12));
      border:1px solid rgba(168,85,247,.25);
      overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      font-size:52px;
      box-shadow:0 8px 32px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.05);
    }
    .hero-avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;}

    /* ── Section ── */
    .section {
      padding:36px 44px;
      margin-bottom:20px;
      opacity:0;
      transform:translateY(28px);
      transition:opacity .6s ease, transform .6s ease;
    }
    .section.visible{opacity:1;transform:translateY(0)}

    .sec-header {
      display:flex;align-items:center;gap:12px;
      margin-bottom:32px;
    }
    .sec-icon {
      width:34px;height:34px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(249,115,22,0.15));
      border:1px solid rgba(255,255,255,0.1);
      flex-shrink:0;
    }
    .sec-icon svg{width:16px;height:16px;color:var(--p1)}
    .sec-title{
      font-size:16px;font-weight:700;
      background:linear-gradient(90deg,var(--text) 0%,var(--sub) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .sec-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.1),transparent)}

    /* ── About ── */
    .about-text{font-size:14px;line-height:1.9;color:var(--sub)}
    .about-text strong{color:var(--text);font-weight:600}

    /* ── Stats ── */
    .stats-row {
      display:flex;flex-wrap:wrap;gap:14px;
      margin-top:28px;
    }
    .stat-card {
      flex:1;min-width:110px;
      background:linear-gradient(135deg,rgba(168,85,247,0.10),rgba(249,115,22,0.07));
      border:1px solid rgba(255,255,255,0.09);
      border-radius:16px;
      padding:18px 20px;
      text-align:center;
      transition:transform .2s, border-color .2s;
      cursor:default;
    }
    .stat-card:hover{transform:translateY(-3px);border-color:rgba(168,85,247,0.3)}
    .stat-val {
      font-size:28px;font-weight:800;letter-spacing:-.03em;
      background:linear-gradient(135deg,var(--p1),var(--p3));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      display:block;line-height:1;margin-bottom:6px;
    }
    .stat-lbl{font-size:11px;color:var(--muted)}

    /* ── Timeline ── */
    .timeline{position:relative;padding-left:24px}
    .timeline::before{
      content:'';position:absolute;left:0;top:10px;bottom:10px;
      width:1px;
      background:linear-gradient(to bottom,transparent,rgba(168,85,247,0.4),rgba(249,115,22,0.3),transparent);
    }

    .tl-item{
      position:relative;padding-bottom:40px;
      opacity:0;transform:translateX(-8px);
      transition:opacity .45s ease,transform .45s ease;
    }
    .tl-item.visible{opacity:1;transform:translateX(0)}
    .tl-item:last-child{padding-bottom:0}

    .tl-item::before{
      content:'';position:absolute;left:-28px;top:10px;
      width:10px;height:10px;border-radius:50%;
      background:linear-gradient(135deg,var(--p1),var(--p2));
      box-shadow:0 0 12px rgba(168,85,247,0.5);
      transition:box-shadow .25s;
    }
    .tl-item:hover::before{box-shadow:0 0 20px rgba(168,85,247,0.8)}

    .tl-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:4px}
    .tl-period{
      font-family:var(--font-mono);font-size:11px;color:var(--muted);
      letter-spacing:.05em;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:999px;padding:3px 11px;white-space:nowrap;
    }
    .tl-role{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
    .tl-company{font-size:12px;color:var(--muted);margin-bottom:12px}

    .tl-bullets{list-style:none;display:flex;flex-direction:column;gap:8px}
    .tl-bullets li{
      font-size:13.5px;color:var(--sub);line-height:1.7;
      padding-left:16px;position:relative;
    }
    .tl-bullets li::before{
      content:'';position:absolute;left:0;top:10px;
      width:4px;height:4px;border-radius:50%;
      background:linear-gradient(135deg,var(--p1),var(--p3));
    }
    .tl-bullets strong{color:var(--text);font-weight:600}
    .tl-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}

    /* ── Tags ── */
    .tag{
      display:inline-block;font-size:11px;font-weight:500;
      border-radius:999px;padding:3px 11px;
      border:1px solid rgba(255,255,255,0.08);
    }
    .tag-gray  {color:var(--sub); background:rgba(255,255,255,0.04)}
    .tag-red   {color:#F472B6;    background:rgba(244,114,182,0.10);border-color:rgba(244,114,182,0.2)}
    .tag-blue  {color:#60A5FA;    background:rgba(96,165,250,0.10); border-color:rgba(96,165,250,0.2)}
    .tag-green {color:#4ADE80;    background:rgba(74,222,128,0.10); border-color:rgba(74,222,128,0.2)}
    .tag-orange{color:#FB923C;    background:rgba(251,146,60,0.10); border-color:rgba(251,146,60,0.2)}
    .tag-purple{color:#C084FC;    background:rgba(192,132,252,0.10);border-color:rgba(192,132,252,0.2)}

    /* ── Project cards ── */
    .proj-grid{display:grid;gap:16px}
    .proj-card {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;padding:22px 26px;
      transition:border-color .2s,background .2s,transform .2s;
      position:relative;overflow:hidden;cursor:default;
    }
    .proj-card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(168,85,247,0.04),rgba(249,115,22,0.03));
      opacity:0;transition:opacity .2s;
    }
    .proj-card:hover{
      border-color:rgba(168,85,247,0.3);
      background:rgba(255,255,255,0.06);
      transform:translateY(-3px);
    }
    .proj-card:hover::before{opacity:1}
    .proj-inner{position:relative;z-index:1}
    .proj-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .proj-name{font-size:15px;font-weight:700;color:var(--text)}
    .proj-desc{font-size:13px;color:var(--sub);line-height:1.75;margin-bottom:12px}

    .demo-badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:11px;font-weight:500;
      color:#C084FC;
      background:rgba(192,132,252,0.12);
      border:1px solid rgba(192,132,252,0.25);
      border-radius:999px;padding:4px 13px;
      white-space:nowrap;flex-shrink:0;cursor:default;
    }
    .demo-badge svg{width:11px;height:11px}

    /* ── Skill Bubbles ── */
    /* ── Knowledge Graph ── */
    .graph-legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px}
    .legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub)}
    .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .graph-outer{
      position:relative;width:100%;height:560px;
      border-radius:14px;overflow:hidden;
      background:#090909;
      box-shadow:inset 0 0 60px rgba(0,0,0,.6);
    }
    #graph-wrap{width:100%;height:100%;cursor:grab}
    #graph-wrap:active{cursor:grabbing}
    .graph-hint{
      text-align:center;margin-top:14px;
      font-size:11px;color:var(--muted);
      font-family:var(--font-mono);
      letter-spacing:.06em;
    }
    /* node detail popup */
    .node-detail{
      position:absolute;
      background:rgba(10,8,22,0.92);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:14px;
      padding:14px 18px;
      min-width:180px;max-width:240px;
      pointer-events:none;
      opacity:0;transform:translateY(4px);
      transition:opacity .18s,transform .18s;
      z-index:20;
    }
    .node-detail.show{opacity:1;transform:translateY(0)}
    .nd-cat{font-size:10px;font-weight:600;letter-spacing:.1em;margin-bottom:6px}
    .nd-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:5px}
    .nd-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.55}

    /* ── Portfolio ── */
    .portfolio-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:14px;
    }
    .port-card{
      position:relative;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
      aspect-ratio:16/10;
      cursor:pointer;
      transition:transform .22s, border-color .22s, box-shadow .22s;
      text-decoration:none;
      display:block;
    }
    .port-card:hover{
      transform:translateY(-4px) scale(1.02);
      border-color:rgba(168,85,247,0.4);
      box-shadow:0 12px 40px rgba(168,85,247,0.2);
    }
    .port-thumb{
      width:100%;height:100%;
      object-fit:cover;
      display:block;
      opacity:.75;
      transition:opacity .22s;
    }
    .port-card:hover .port-thumb{ opacity:1; }
    /* placeholder bg when no image */
    .port-thumb-placeholder{
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      font-size:32px;
    }
    .port-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top, rgba(8,8,16,.85) 0%, transparent 55%);
      display:flex;flex-direction:column;justify-content:flex-end;
      padding:14px;
    }
    .port-type-badge{
      position:absolute;top:10px;left:10px;
      font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      border-radius:999px;padding:3px 10px;
      backdrop-filter:blur(8px);
    }
    .type-account {background:rgba(168,85,247,0.3);color:#D8B4FE;border:1px solid rgba(168,85,247,0.4)}
    .type-video   {background:rgba(239,68,68,0.3); color:#FCA5A5;border:1px solid rgba(239,68,68,0.4)}
    .type-workflow{background:rgba(34,211,238,0.25);color:#A5F3FC;border:1px solid rgba(34,211,238,0.35)}
    .type-screenshot{background:rgba(249,115,22,0.25);color:#FED7AA;border:1px solid rgba(249,115,22,0.35)}
    .port-play-btn{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:38px;height:38px;border-radius:50%;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.2);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s;
    }
    .port-card:hover .port-play-btn{ opacity:1; }
    .port-play-btn svg{width:14px;height:14px;color:#fff;margin-left:2px}
    .port-title{font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
    .port-meta{font-size:10px;color:rgba(255,255,255,0.5)}

    /* ── Admin FAB ── */
    .admin-fab{
      position:fixed;bottom:28px;right:28px;
      height:40px;border-radius:999px;
      background:rgba(168,85,247,0.15);
      backdrop-filter:blur(12px);
      border:1px solid rgba(168,85,247,0.3);
      color:rgba(255,255,255,0.6);
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;
      padding:0 16px;
      font-size:12px;font-family:var(--font-mono);
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
      transition:all .2s;
      text-decoration:none;z-index:100;
    }
    .admin-fab:hover{
      background:rgba(168,85,247,0.3);
      border-color:rgba(168,85,247,0.6);
      color:#fff;
      transform:translateY(-2px);
      box-shadow:0 6px 28px rgba(168,85,247,0.4);
    }
    .admin-fab svg{width:13px;height:13px;opacity:.7}

    footer{
      text-align:center;padding-top:40px;
      font-size:12px;color:var(--muted);
      font-family:var(--font-mono);
    }

    @media(max-width:640px){
      .hero{padding:36px 28px}
      .section{padding:28px 22px}
      .hero-name{font-size:40px}
      .skills-grid{grid-template-columns:1fr}
    }
  </style>

</head>

    <div class="sec-header">
      <div class="sec-icon">${ICO.user}</div>
      <span class="sec-title">自我介绍</span>
      <div class="sec-line"></div>
    </div>
    <p class="about-text">${D.about.p1}</p>
    <p class="about-text" style="margin-top:14px">${D.about.p2}</p>
    <div class="stats-row">${statHtml}</div>
  </div>

  <div class="section glass" id="sec-exp">
    <div class="sec-header">
      <div class="sec-icon">${ICO.bag}</div>
      <span class="sec-title">工作经历</span>
      <div class="sec-line"></div>
    </div>
    <div class="timeline">${expHtml}</div>
  </div>

  <div class="section glass" id="sec-ai">
    <div class="sec-header">
      <div class="sec-icon">${ICO.robot}</div>
      <span class="sec-title">AI 自学项目（2025）</span>
      <div class="sec-line"></div>
    </div>
    <div class="proj-grid">${projHtml}</div>
  </div>

  <div class="section glass" id="sec-portfolio">
    <div class="sec-header">
      <div class="sec-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
      <span class="sec-title">作品展示</span>
      <div class="sec-line"></div>
    </div>
    ${portfolioHtml}
  </div>

  <div class="section glass" id="sec-skills">
    <div class="sec-header">
      <div class="sec-icon">${ICO.tool}</div>
      <span class="sec-title">知识图谱</span>
      <div class="sec-line"></div>
    </div>
    <div>${skillsHtml}</div>
  </div>

  <footer>${P.name} · 简历 · ${new Date().getFullYear()}.${String(new Date().getMonth()+1).padStart(2,'0')}</footer>
  `;

  // ── 打字效果 ──
  const roles=P.intents||['新媒体运营'];
  let ri=0,ci=0,del=false;
  const el=document.getElementById('typed');
  function type(){
    const cur=roles[ri];
    if(!del){el.innerHTML=cur.slice(0,ci+1)+'<span class="cursor"></span>';ci++;
      if(ci===cur.length){del=true;setTimeout(type,2200);return}}
    else{el.innerHTML=cur.slice(0,ci-1)+'<span class="cursor"></span>';ci--;
      if(ci===0){del=false;ri=(ri+1)%roles.length}}
    setTimeout(type,del?38:75);
  }
  type();

  // ── 数字计数动画 ──
  function animateCount(el, target){
    const num = parseInt(target.replace(/[^0-9]/g,''));
    if(isNaN(num)){return;}
    const prefix = target.match(/^[^0-9]*/)?.[0]||'';
    const suffix = target.match(/[^0-9]*$/)?.[0]||'';
    let start=0;
    const dur=1200, step=16;
    const inc=num/(dur/step);
    const t=setInterval(()=>{
      start=Math.min(start+inc,num);
      el.textContent=prefix+Math.floor(start)+suffix;
      if(start>=num){el.textContent=target;clearInterval(t);}
    },step);
  }

  // ── Scroll animations ──
  const secObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');}});
  },{threshold:.07});
  document.querySelectorAll('.section').forEach(s=>secObs.observe(s));
  // portfolio cards stagger
  const portObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      e.target.querySelectorAll('.port-card').forEach((c,i)=>{
        c.style.opacity='0';c.style.transform='translateY(16px)';
        setTimeout(()=>{c.style.transition='opacity .4s ease,transform .4s ease';c.style.opacity='1';c.style.transform='translateY(0)';},i*80);
      });
      portObs.unobserve(e.target);
    });
  },{threshold:.05});
  const portSec=document.getElementById('sec-portfolio');
  if(portSec)portObs.observe(portSec);

  const tlObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      e.target.querySelectorAll('.tl-item').forEach((item,i)=>{
        setTimeout(()=>item.classList.add('visible'),i*150);
      });
      tlObs.unobserve(e.target);
    });
  },{threshold:.04});
  document.querySelectorAll('.timeline').forEach(t=>tlObs.observe(t));

  const statObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      e.target.querySelectorAll('.stat-val').forEach(el=>{
        animateCount(el, el.dataset.target);
      });
      statObs.unobserve(e.target);
    });
  },{threshold:.3});
  const statsRow=document.querySelector('.stats-row');
  if(statsRow)statObs.observe(statsRow);

  // ── Knowledge Graph init ──
  function initGraph(){
    const wrap = document.getElementById('graph-wrap');
    if(!wrap || typeof ForceGraph === 'undefined') return;

    const W = wrap.clientWidth || 800;
    const H = 560;
    let hoveredNode = null;

    // deep clone so ForceGraph can mutate positions
    const gData = {
      nodes: _GRAPH_DATA.nodes.map(n=>({...n})),
      links: _GRAPH_DATA.links.map(l=>({...l})),
    };

    const graph = ForceGraph()(wrap)
      .width(W).height(H)
      .backgroundColor('#090909')
      .graphData(gData)
      .linkColor(()=>'rgba(255,255,255,0.18)')
      .linkWidth(1)
      .linkDirectionalParticles(2)
      .linkDirectionalParticleWidth(1.5)
      .linkDirectionalParticleSpeed(0.004)
      .nodeRelSize(1)
      .nodeVal(n => (n.r||10) * (n.r||10))
      .nodeColor(n => (_GRAPH_CATS[n.cat]||_GRAPH_CATS.basic).color)
      .nodeLabel(n => `${n.label}: ${n.desc||''}`)
      .nodeCanvasObject((node, ctx, gs)=>{
        if(!isFinite(node.x)||!isFinite(node.y)) return;
        const cat = _GRAPH_CATS[node.cat] || _GRAPH_CATS.basic;
        const isHov = hoveredNode === node;
        const r = (node.r || 10) * (isHov ? 1.2 : 1);

        // glow
        try {
          const grd = ctx.createRadialGradient(node.x,node.y,r*0.2, node.x,node.y,r*2.4);
          grd.addColorStop(0, cat.glow);
          grd.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.beginPath(); ctx.arc(node.x,node.y,r*2.4,0,Math.PI*2);
          ctx.fillStyle = grd; ctx.fill();
        } catch(e){}

        // fill
        ctx.beginPath(); ctx.arc(node.x,node.y,r,0,Math.PI*2);
        ctx.fillStyle = cat.bg; ctx.fill();

        // ring
        ctx.beginPath(); ctx.arc(node.x,node.y,r,0,Math.PI*2);
        ctx.strokeStyle = isHov ? '#ffffff' : cat.color;
        ctx.lineWidth = node.layer===0 ? 2.5 : 1.5;
        ctx.stroke();

        // text — auto-fit inside circle, tech font, shadow
        const maxW = r * 1.72;           // ~86% of diameter
        const wt   = node.layer<=1 ? '600' : '400';
        const fam  = '"Space Grotesk",Inter,"PingFang SC",sans-serif';
        let fs     = Math.min(r * 0.56, node.layer===0 ? 13 : node.layer===1 ? 11 : 9);
        ctx.font = `${wt} ${fs}px ${fam}`;
        // shrink until fits
        while(fs > 6.5 && ctx.measureText(node.label).width > maxW){
          fs -= 0.5;
          ctx.font = `${wt} ${fs}px ${fam}`;
        }
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        // clip to circle so text never bleeds out
        ctx.save();
        ctx.beginPath(); ctx.arc(node.x, node.y, r * 0.93, 0, Math.PI*2); ctx.clip();
        // subtle shadow for depth
        ctx.shadowColor   = 'rgba(0,0,0,0.75)';
        ctx.shadowBlur    = 5;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 1;
        ctx.fillStyle = (node.layer===0||isHov) ? '#ffffff' : cat.color;
        ctx.fillText(node.label, node.x, node.y);
        ctx.restore();
        // reset shadow
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      })
      .nodeCanvasObjectMode(()=>'replace')
      .d3AlphaDecay(0.015)
      .d3VelocityDecay(0.35)
      .cooldownTicks(Infinity)
      .onNodeHover(node=>{
        hoveredNode = node;
        wrap.style.cursor = node ? 'pointer' : 'grab';
      })
      .onNodeClick((node, evt)=>{
        const panel = document.getElementById('node-detail');
        if(!panel) return;
        const cat = _GRAPH_CATS[node.cat] || _GRAPH_CATS.basic;
        document.getElementById('nd-cat').textContent  = cat.label.toUpperCase();
        document.getElementById('nd-cat').style.color  = cat.color;
        document.getElementById('nd-name').textContent = node.label;
        document.getElementById('nd-desc').textContent = node.desc||'';
        const rect = wrap.parentElement.getBoundingClientRect();
        panel.style.left = Math.min(evt.clientX-rect.left+16, W-260)+'px';
        panel.style.top  = Math.min(evt.clientY-rect.top+16,  H-130)+'px';
        panel.classList.add('show');
        setTimeout(()=>panel.classList.remove('show'), 4000);
      });

    // Adjust forces
    try {
      graph.d3Force('charge').strength(n=>-(n.r||10)*12);
      graph.d3Force('link')
        .distance(l=>{
          const sid = l.source?.id||l.source;
          const s = gData.nodes.find(n=>n.id===sid);
          return s ? [90,70,50,36][Math.min(s.layer,3)] : 55;
        })
        .strength(0.4);
      graph.d3ReheatSimulation();
    } catch(e){}

    // Zoom to fit repeatedly as simulation settles
    setTimeout(()=>{ try{ graph.zoomToFit(400, 40); }catch(e){} }, 800);
    setTimeout(()=>{ try{ graph.zoomToFit(400, 40); }catch(e){} }, 2000);

    // Resize observer
    new ResizeObserver(()=>{
      const w = wrap.clientWidth;
      if(w && Math.abs(w-graph.width())>20) graph.width(w);
    }).observe(wrap);
  }

  // Init graph when section enters viewport
  const graphObs = new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting){
      graphObs.disconnect();
      setTimeout(initGraph, 80);
    }
  }, {threshold: 0.05});
  const skillsSec = document.getElementById('sec-skills');
  if(skillsSec) graphObs.observe(skillsSec);
  else setTimeout(initGraph, 200); // fallback

  // hero自动visible
  setTimeout(()=>{
    document.querySelectorAll('.section').forEach(s=>{
      const r=s.getBoundingClientRect();
      if(r.top<window.innerHeight)s.classList.add('visible');
    });
  },100);
}

render();
window.addEventListener('storage',e=>{if(e.key==='resume_data')render();});
</script>
</body>
</html>
